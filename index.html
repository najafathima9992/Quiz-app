<!DOCTYPE html>
<html>
<head>
<title>Quiz Exam Portal</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', Arial, sans-serif;
  background: url('https://images.unsplash.com/photo-1522202176988-66273c2fd55f') no-repeat center center/cover;
  height: 100vh;
}

/* Dark overlay */
body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  z-index: -1;
}

.container {
  max-width: 500px;
  margin: 80px auto;
  background: #ffffff;
  padding: 30px;
  border-radius: 10px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  text-align: center;
}

h2 {
  color: #111827;
  margin-bottom: 10px;
}

h3 {
  color: #f59e0b;
  margin-bottom: 20px;
}

input, select {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border: 1px solid #ddd;
  border-radius: 6px;
  font-size: 14px;
}

button {
  width: 100%;
  padding: 14px;
  background: #111827;
  color: white;
  border: none;
  border-radius: 6px;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #000;
}

.footer {
  text-align: center;
  color: #f59e0b;
  margin-top: 20px;
  font-size: 14px;
}

</style>
</head>

<body>

<div class="container">

<h2>Quiz Exam</h2>

<div class="timer" id="timer">Time: 05:00</div>

<div class="progress">
<div class="progress-bar" id="progressBar"></div>
</div>

<div id="quiz"></div>

<div>
<button onclick="prevQuestion()">Previous</button>
<button onclick="nextQuestion()">Next</button>
<button onclick="submitQuiz()">Submit</button>
</div>

<div id="result"></div>

</div>

<script>

const questions = [ {q:"1. What does AWS stand for?",a:["Amazon Web Services","Advanced Web System","Application Web Server","Amazon Web Server"],c:0}, {q:"2. Which AWS service is used for virtual servers?",a:["S3","EC2","Lambda","RDS"],c:1}, {q:"3. Which service stores objects?",a:["EC2","S3","IAM","SNS"],c:1}, {q:"4. Serverless compute service?",a:["Lambda","EC2","Lightsail","Beanstalk"],c:0}, {q:"5. Which service manages permissions?",a:["IAM","EC2","S3","CloudFront"],c:0}, {q:"6. DynamoDB is a?",a:["SQL database","NoSQL database","File system","Cache"],c:1}, {q:"7. API Gateway is used for?",a:["DNS","Creating APIs","Storage","Monitoring"],c:1}, {q:"8. AWS region means?",a:["Physical location","Server type","Pricing model","User account"],c:0}, {q:"9. Which service monitors resources?",a:["CloudWatch","SNS","SQS","IAM"],c:0}, {q:"10. EC2 instance is?",a:["Database","Virtual machine","Storage bucket","API"],c:1}, {q:"11. What command lists files in Linux?",a:["ls","cd","pwd","rm"],c:0}, {q:"12. Command to change directory?",a:["mv","cd","ls","pwd"],c:1}, {q:"13. Hard link shares?",a:["inode","memory","process","cpu"],c:0}, {q:"14. Soft link is?",a:["shortcut","copy","folder","script"],c:0}, {q:"15. Which port is HTTP?",a:["80","22","443","21"],c:0}, {q:"16. HTTPS port?",a:["22","80","443","25"],c:2}, {q:"17. SSH port?",a:["21","22","25","443"],c:1}, {q:"18. Docker is?",a:["Container platform","Database","OS","Language"],c:0}, {q:"19. Jenkins used for?",a:["CI/CD","Storage","Monitoring","DNS"],c:0}, {q:"20. Git command to upload code?",a:["push","pull","clone","commit"],c:0}, {q:"21. Git clone means?",a:["Download repo","Upload repo","Delete repo","Copy branch"],c:0}, {q:"22. Git pull means?",a:["Download updates","Upload code","Delete code","Create repo"],c:0}, {q:"23. HTTP 404 means?",a:["Server error","Not found","Redirect","Success"],c:1}, {q:"24. HTTP 500 means?",a:["Internal error","Success","Redirect","Forbidden"],c:0}, {q:"25. Nginx is?",a:["Web server","Database","OS","Firewall"],c:0}, {q:"26. Apache is?",a:["Web server","Database","Language","IDE"],c:0}, {q:"27. Load balancer does?",a:["Distribute traffic","Store data","Compile code","Scan virus"],c:0}, {q:"28. Auto scaling means?",a:["Automatic instance adjust","Manual scaling","Stopping servers","Backup"],c:0}, {q:"29. CloudFront is?",a:["CDN","Database","Server","Firewall"],c:0}, {q:"30. RDS is?",a:["Relational database","Storage","Compute","API"],c:0}, {q:"31. SNS used for?",a:["Notifications","Storage","Compute","DNS"],c:0}, {q:"32. SQS is?",a:["Queue service","Storage","API","Compute"],c:0}, {q:"33. IAM role provides?",a:["Permissions","Storage","Compute","Logs"],c:0}, {q:"34. CloudTrail records?",a:["API activity","CPU usage","Network","Memory"],c:0}, {q:"35. Route53 is?",a:["DNS service","Compute","Database","Monitoring"],c:0}, {q:"36. Linux root user?",a:["Admin","Guest","User","Operator"],c:0}, {q:"37. chmod command?",a:["Change permissions","Delete file","Move file","List files"],c:0}, {q:"38. mkdir command?",a:["Create directory","Delete directory","Copy file","Move file"],c:0}, {q:"39. rm command?",a:["Delete file","Move file","Create file","Read file"],c:0}, {q:"40. pwd command?",a:["Show current path","Delete path","Change path","Copy path"],c:0}, {q:"41. DevOps means?",a:["Development + Operations","Device operation","Developer option","Dev system"],c:0}, {q:"42. CI means?",a:["Continuous Integration","Central Instance","Cloud Integration","Compute Index"],c:0}, {q:"43. CD means?",a:["Continuous Delivery","Cloud Database","Code Deploy","Central Data"],c:0}, {q:"44. Container means?",a:["Lightweight environment","Database","Server","Script"],c:0}, {q:"45. Kubernetes manages?",a:["Containers","Databases","Servers","DNS"],c:0}, {q:"46. What is Firewall?",a:["Security system","Database","Storage","CPU"],c:0}, {q:"47. FTP port?",a:["21","22","23","80"],c:0}, {q:"48. SMTP port?",a:["25","80","22","21"],c:0}, {q:"49. What is DNS?",a:["Domain Name System","Data Network Service","Dynamic Network System","Domain Node Server"],c:0}, {q:"50. What is IP address?",a:["Unique network address","Password","Server name","Port number"],c:0} ];

let current = 0;
let answers = new Array(questions.length);

// ===== TIMER =====
let time = 300; // 5 minutes

setInterval(()=>{
if(time <= 0){
submitQuiz();
return;
}
time--;
let min = Math.floor(time/60);
let sec = time%60;
document.getElementById("timer").innerText =
`Time: ${min}:${sec<10?"0":""}${sec}`;
},1000);

// ===== LOAD QUESTION =====
function loadQuestion(){

let q = questions[current];

let html = `<div class="question"><b>${current+1}. ${q.q}</b><br>`;

q.a.forEach((opt,i)=>{
html += `<label>
<input type="radio" name="option" value="${i}" 
${answers[current]==i?"checked":""}>
${opt}
</label><br>`;
});

html += "</div>";

document.getElementById("quiz").innerHTML = html;

// progress bar
document.getElementById("progressBar").style.width =
((current+1)/questions.length)*100 + "%";

}

// ===== NAVIGATION =====
function nextQuestion(){
saveAnswer();
if(current < questions.length-1){
current++;
loadQuestion();
}
}

function prevQuestion(){
saveAnswer();
if(current > 0){
current--;
loadQuestion();
}
}

function saveAnswer(){
let selected = document.querySelector('input[name="option"]:checked');
if(selected){
answers[current] = parseInt(selected.value);
}
}

// ===== SUBMIT =====
function submitQuiz(){

saveAnswer();

let score = 0;

questions.forEach((q,i)=>{
if(answers[i] == q.c){
score++;
}
});

document.getElementById("quiz").innerHTML = "";
document.getElementById("result").innerHTML =
`<h3>Your Score: ${score}/${questions.length}</h3>`;

// ===== API CALL =====
fetch("https://p4ax8cry34.execute-api.us-east-1.amazonaws.com/submit",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
Score:score,
Attempted:questions.length
})
});

}

// start
loadQuestion();

</script>

</body>
</html>
